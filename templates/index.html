<!DOCTYPE html>
<html>
  <head>
    <title>To-Do List</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
      }
      .todo-form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      input,
      textarea {
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        padding: 10px 15px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background-color: #45a049;
      }
    </style>
  </head>
  <body>
    <h1>Add New To-Do Item</h1>
    <form class="todo-form" action="/submittodoitem" method="POST">
      <div class="form-group">
        <label for="itemName">Item Name:</label>
        <input type="text" id="itemName" name="itemName" required />
      </div>
      <div class="form-group">
        <label for="itemId">Item ID:</label>
        <input type="text" id="itemId" name="itemId" required />
      </div>
      <div class="form-group">
        <label for="itemUuid">Item UUID:</label>
        <input type="text" id="itemUuid" name="itemUuid" required />
      </div>
      <div class="form-group">
        <label for="itemHash">Item Hash:</label>
        <input type="text" id="itemHash" name="itemHash" required />
      </div>
      <div class="form-group">
        <label for="itemDescription">Description:</label>
        <textarea
          id="itemDescription"
          name="itemDescription"
          rows="4"
          required
        ></textarea>
      </div>
      <button type="submit">Add To-Do Item</button>
    </form>
    <p><a href="/">Back to Home</a></p>
  </body>
</html>
